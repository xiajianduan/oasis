name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - name: Download tun2socks asset
        run: |
          curl -sSfL -o /tmp/tun2socks.zip \
            "https://github.com/xjasonlyu/tun2socks/releases/download/v2.6.0/tun2socks-darwin-amd64.zip"
          unzip -p /tmp/tun2socks.zip tun2socks-darwin-amd64 > internal/assets/tun2socks_darwin_amd64
          rm -f /tmp/tun2socks.zip
          chmod +x internal/assets/tun2socks_darwin_amd64
      - name: Build binaries
        run: |
          mkdir -p dist
          GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o dist/oasis-darwin-amd64 ./cmd/oasis
          GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o dist/oasis-darwin-arm64 ./cmd/oasis
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o dist/oasis-linux-amd64 ./cmd/oasis
          cd dist && sha256sum * > checksums.txt
      - name: Upload Release Assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.event.release.tag_name }} dist/*
